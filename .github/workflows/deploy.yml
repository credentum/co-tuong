name: Build and Deploy Cờ Tướng

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'nginx.conf'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/co-tuong
  PROJECT_NAME: co-tuong
  IMAGE_NAME: ghcr.io/credentum/co-tuong

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "::add-mask::${{ secrets.HETZNER_SSH_KEY }}"

          SSH_KEY="${{ secrets.HETZNER_SSH_KEY }}"
          if echo "$SSH_KEY" | grep -q "^-----BEGIN"; then
            echo "$SSH_KEY" > ~/.ssh/id_ed25519
          else
            echo "$SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          fi

          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
              "mkdir -p $DEPLOY_PATH"

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              docker-compose.yml \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:$DEPLOY_PATH/

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << EOSSH
            set -e
            cd $DEPLOY_PATH

            echo "Deploying Co Tuong"
            echo "==================="

            # Login to GHCR
            echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            # Pull latest image
            docker pull $IMAGE_NAME:latest

            # Restart service
            docker compose -p $PROJECT_NAME down --remove-orphans 2>/dev/null || true
            docker compose -p $PROJECT_NAME up -d --force-recreate

            # Logout
            docker logout ghcr.io 2>/dev/null || true

            # Health check — static site, should be instant
            echo "Waiting for service..."
            for i in 1 2 3 4 5 6; do
              sleep 2
              if wget -qO- http://localhost:3090/health 2>/dev/null | grep -q '"ok"'; then
                echo "Co Tuong: healthy (http://localhost:3090)"
                break
              fi
              echo "  Attempt \$i/6 — not ready yet..."
              if [ "\$i" = "6" ]; then
                echo "Co Tuong: not healthy after 12s"
                docker compose -p $PROJECT_NAME logs --tail=20
                exit 1
              fi
            done

            echo "Deployment complete"
          EOSSH

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
