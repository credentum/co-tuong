server {
    listen 3090;
    server_name _;
    root /var/www/html;
    index index.html;

    # Gzip — critical for PWA offline caching speed
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Static assets — long cache (hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webp|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — must not be cached
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # PWA manifest
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
